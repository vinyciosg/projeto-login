<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="estilos/mediaquery.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="estilos/estyle.css">
</head>
<body>
    <main>
        <section id="login">
             <div id="imagen">
                  <!-- Lugar da imagen -->
             </div>
             <div id="formulario">
                  <h1>Login</h1>
                  <p>seja bem-vindo(a) novamente. Faça o login para acessar sua conta e poder fazer configurações no seu amibiente</p>
                  <form action="login.php" method="post" autocomplete="on">
                  
                    <div class="campo">
                        <span class="material-symbols-outlined"> person </span>

                        <input type="email" name="login" id="ilogin" required autocomplete="email" maxlength="30" placeholder="seu e-mail">

                        <label for="ilogin"></label>
                    </div>
                    <div class="campo">
                        <span class="material-symbols-outlined">key</span>

                        <input type="password" name="senha" id="isenha" required autocomplete="new-password" maxlength="8" placeholder="sua senha">

                        <label for="isenha"></label>

                    </div>

                    <input type="submit" value="Entrar">

                    <a href="Esqueci.html" class="botao">
                        Esqueci a senha <span class="material-symbols-outlined"> mail</span>
                    </a>
  
                     
                  </form>
             </div>
        </section>
    </main>
</body>
</html>
